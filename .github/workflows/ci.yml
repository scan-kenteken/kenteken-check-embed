# npm Trusted Publishing (OIDC) is configured for this workflow filename: ci.yml
name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read
  id-token: write # required for npm Trusted Publishing on version tags

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install font build tools
        run: pip install fonttools brotli

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm pack --dry-run

  release:
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches VERSION
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION="$(tr -d '[:space:]' < VERSION)"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$VERSION" ] || [ "$TAG" != "$PKG" ]; then
            echo "Tag v${TAG}, VERSION (${VERSION}), and package.json (${PKG}) must match"
            exit 1
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install font build tools
        run: pip install fonttools brotli

      - name: Publish to npm
        run: |
          npm ci
          NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "${NAME}@${VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "${NAME}@${VERSION} is already published on npm; skipping npm publish"
          else
            npm run typecheck
            npm run build
            npm publish --ignore-scripts
          fi

      - name: Verify R2 CDN secrets
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          test -n "$R2_ACCOUNT_ID" || { echo "R2_ACCOUNT_ID secret is not set"; exit 1; }
          test -n "$R2_BUCKET" || { echo "R2_BUCKET secret is not set"; exit 1; }
          test -n "$R2_ACCESS_KEY_ID" || { echo "R2_ACCESS_KEY_ID secret is not set"; exit 1; }
          test -n "$R2_SECRET_ACCESS_KEY" || { echo "R2_SECRET_ACCESS_KEY secret is not set"; exit 1; }

      - name: Deploy embed assets to R2 CDN
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          npm ci
          npm run build

          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          PREFIX="kenteken-check/v1"

          aws s3 cp dist/embed.js "s3://${R2_BUCKET}/${PREFIX}/embed.js" \
            --endpoint-url "$ENDPOINT" \
            --content-type "application/javascript; charset=utf-8" \
            --cache-control "public, max-age=3600"

          aws s3 cp dist/kenteken.woff2 "s3://${R2_BUCKET}/${PREFIX}/kenteken.woff2" \
            --endpoint-url "$ENDPOINT" \
            --content-type "font/woff2" \
            --cache-control "public, max-age=31536000, immutable"

          echo "Deployed to s3://${R2_BUCKET}/${PREFIX}/"
